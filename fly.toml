app = "wave-backend"
primary_region = "iad"   # Change to your nearest: ams, sin, syd, gru, etc.

[build]

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = false   # Keep alive — no cold starts
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[env]
  NODE_ENV = "production"
  PORT     = "8080"

# Add secrets via: fly secrets set GEMINI_API_KEY=your_key
# fly secrets set CLAUDE_API_KEY=your_key
